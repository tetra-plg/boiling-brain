name: lint

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  schedule:
    # Weekly external-link report (non-blocking). Mondays 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  issues: write   # link-check-report opens/updates the dead-links issue

jobs:
  format-check:
    name: format-check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      # Obsidian-safe formatter check (wraps Prettier; preserves pipes in
      # wikilinks and code spans inside tables — see scripts/wiki-maint/format-md.py).
      - run: python3 scripts/wiki-maint/format-md.py --check "**/*.md"

  markdownlint:
    name: markdownlint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !**/raw/**
            !**/.claude/worktrees/**
            !**/cache/**
            !**/.venv/**
            !**/.venv-*/**

  wiki-integrity:
    name: wiki-integrity
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      # PyYAML lets validate-wiki.py run its frontmatter YAML-syntax check
      # (aligns with the MCP/index consumers); without it the check is skipped.
      - run: python3 -m pip install --quiet pyyaml
      - run: python3 scripts/wiki-maint/validate-wiki.py

  link-check-report:
    name: link-check-report
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lychee external link report
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path raw
            --exclude-path node_modules
            --exclude 'mailto:'
            --accept '100..=103,200..=299,403,429'
            './**/*.md'
          fail: false
          # honors .lycheeignore for files/links generated at bootstrap time
